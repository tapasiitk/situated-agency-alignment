# Stage 0b ecology calibration - Candidate G.
# Env A, tag-only, baseline-only. Population midpoint between A and B.

env:
  grid_size: 15
  num_agents: 5
  max_steps: 1000

  apple_density: 0.30
  apple_spawn_mode: central_patch
  regrowth_speed: 0.50

  waste_spawn_rate: 0.0
  dynamic_waste_enabled: false
  dynamic_waste_prob: 0.0
  zap_waste_reward: 0.0
  waste_regrowth_suppression: 0.0
  waste_spread_prob: 0.0

  zap_agent_reward: 0.0
  victim_penalty: 0.0
  zap_timeout: 25
  zap_cost: 0.0

training:
  episodes: 2000
  update_every: 10
  use_amp: true
  amp_inference: false
  compile_model: false
  lr: 1.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  ppo_epochs: 4
  batch_size: 64
  contrastive_batch_size: 64
  contrastive_weight: 0.0
  role_loss_weight: 0.0

logging:
  project_name: "karma-m1-stage0-ecology"
  use_wandb: true
  local_results_dir: "results/stage0_env_A_G_n5_ad030_rg050_zt25"
  log_interval: 20
  checkpoint_interval: 200
