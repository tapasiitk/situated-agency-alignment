# Symmetric Env B - cleanup is purely instrumental via waste-suppresses-regrowth
# mechanic; no shaping reward. Aggression and cleanup are both Leibo-faithful
# (instrumental, not shaped): zap_agent_reward = zap_waste_reward = 0.0.
# 4000 episodes, 5 seeds to be run separately. See docs/M1_complete_guide.md (2.1).

env:
  grid_size: 15
  num_agents: 4
  max_steps: 1000

  apple_density: 0.30
  apple_spawn_mode: central_patch
  regrowth_speed: 1.0

  waste_spawn_rate: 0.10
  dynamic_waste_enabled: true
  dynamic_waste_prob: 0.02
  zap_waste_reward: 0.0              # symmetric with zap_agent_reward = 0.0
  waste_regrowth_suppression: 0.05   # alpha; tunable in pilot

  zap_agent_reward: 0.0
  victim_penalty: 0.0
  zap_timeout: 25
  zap_cost: 0.0

training:
  episodes: 4000
  update_every: 10
  use_amp: true
  amp_inference: false
  compile_model: false
  lr: 1.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  ppo_epochs: 4
  batch_size: 64
  contrastive_batch_size: 64
  contrastive_weight: 0.0
  role_loss_weight: 0.0

logging:
  project_name: "karma-m1-empathy-gap"
  use_wandb: true
  local_results_dir: "results/m1_env_B_sc030_sym"
  log_interval: 20
  checkpoint_interval: 200
