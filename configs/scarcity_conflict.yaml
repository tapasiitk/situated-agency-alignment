env:
  grid_size: 15
  num_agents: 4
  max_steps: 1000
  # Canonical baseline profile
  apple_density: 0.35
  apple_spawn_mode: central_patch
  regrowth_speed: 1.0
  
  # Disable cleanup pathway
  waste_spawn_rate: 0.0
  dynamic_waste_enabled: false
  dynamic_waste_prob: 0.0
  zap_waste_reward: 0.0
  
  # Aggression Levers
  zap_agent_reward: 0.0
  zap_timeout: 25
  zap_cost: 0.001

training:
  episodes: 25000
  
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  ppo_epochs: 4
  batch_size: 64
  update_every: 10
  
  contrastive_batch_size: 64
  contrastive_weight: 0.1
  role_loss_weight: 0.1

logging:
  project_name: "karma-mirror-test"
  use_wandb: true
  local_results_dir: "results/scarcity_conflict"
  log_interval: 20
  checkpoint_interval: 1000

