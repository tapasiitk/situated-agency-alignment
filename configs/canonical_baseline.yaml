env:
  grid_size: 15
  num_agents: 4
  max_steps: 1000

  # Canonical-style resource setup
  apple_density: 0.35
  apple_spawn_mode: central_patch
  regrowth_speed: 1.0

  # Disable cleaning pathway for replication anchor
  waste_spawn_rate: 0.0
  dynamic_waste_enabled: false
  dynamic_waste_prob: 0.0
  zap_waste_reward: 0.0

  # Conflict-only aggression settings
  zap_agent_reward: 0.0
  zap_timeout: 25
  zap_cost: 0.001

training:
  episodes: 2000
  update_every: 10
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  ppo_epochs: 4
  batch_size: 64
  contrastive_batch_size: 64
  contrastive_weight: 0.1
  role_loss_weight: 0.1

logging:
  project_name: "karma-canonical-baseline"
  use_wandb: true
  local_results_dir: "results/canonical_baseline"
  log_interval: 20
  checkpoint_interval: 0

# Example:
# python train_karma.py --config configs/canonical_baseline.yaml --mode baseline --seed 42
