# M1 base config — shared defaults for the empathy-gap diagnostic study.
# Do not run this file directly. Use the env/scarcity-specific variants that
# override `apple_density`, `zap_waste_reward`, `waste_spawn_rate`, and the
# logging / local_results_dir fields.

env:
  grid_size: 15
  num_agents: 4
  max_steps: 1000

  # Resource regime — overridden per scarcity variant.
  apple_density: 0.30
  apple_spawn_mode: central_patch
  regrowth_speed: 1.0

  # Waste / cleanup — overridden per env variant (A = tag-only, B = dual-use).
  waste_spawn_rate: 0.0
  dynamic_waste_enabled: false
  dynamic_waste_prob: 0.0
  zap_waste_reward: 0.0

  # Aggression pathway — Leibo-faithful: instrumental, not shaped.
  zap_agent_reward: 0.0
  victim_penalty: 0.0
  zap_timeout: 25
  zap_cost: 0.0

training:
  episodes: 4000
  update_every: 10
  use_amp: true
  amp_inference: false
  compile_model: false
  lr: 1.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  ppo_epochs: 4
  batch_size: 64
  contrastive_batch_size: 64
  contrastive_weight: 0.0   # M1 is baseline-only; no contrastive loss.
  role_loss_weight: 0.0

logging:
  project_name: "karma-m1-empathy-gap"
  use_wandb: false           # default off; enable per-variant if desired.
  local_results_dir: "results/m1"
  log_interval: 20
  checkpoint_interval: 200
